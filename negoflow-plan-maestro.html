const fmt = n => "$" + Math.abs(n).toLocaleString("es-MX");
const pctStr = n => (n >= 0 ? "+" : "-") + fmt(n);

function getPlanCtx(date) {
  if (date < PROJECT_START) return { pre: true };
  if (date >= PROJECT_END)  return { done: true };
  const mi = MONTHS.findIndex(m => m.year === date.getFullYear() && m.month === date.getMonth() + 1);
  if (mi === -1) return null;
  const md = MONTHS[mi];
  const mStart = new Date(md.year, md.month - 1, 1);
  const dayInM = Math.floor((date - mStart) / 86400000);
  const wi = Math.min(md.semanas.length - 1, Math.floor(dayInM / 7));
  const sem = md.semanas[wi];
  const keys = [null,"lunes","martes","miercoles","jueves","viernes",null];
  const dk = keys[date.getDay()];
  const names = ["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
  const daysLeft = Math.ceil((PROJECT_END - date) / 86400000);
  const total = Math.ceil((PROJECT_END - PROJECT_START) / 86400000);
  const elapsed = Math.floor((date - PROJECT_START) / 86400000);
  return { mi, md, wi, sem, dk, task: dk ? sem?.[dk] : null,
    isWeekend: date.getDay() === 0 || date.getDay() === 6,
    daysLeft, progress: (elapsed / total) * 100, dayName: names[date.getDay()] };
}

// ── TAB TRACKER ───────────────────────────────────────────────────────────
function TabTracker() {
  const [data, setData] = useState({});
  const [saved, setSaved] = useState(false);

  useEffect(() => {
    try {
      const s = localStorage.getItem("nf-tracker-jul26");
      if (s) setData(JSON.parse(s));
    } catch(e) {}
  }, []);

  const upd = (id, field, val) => {
    const k = `m${id}`;
    const nd = { ...data, [k]: { ...(data[k]||{}), [field]: val } };
    setData(nd);
    try { localStorage.setItem("nf-tracker-jul26", JSON.stringify(nd)); } catch(e) {}
    setSaved(true); setTimeout(() => setSaved(false), 2000);
  };

  const g = (id, field) => data[`m${id}`]?.[field] ?? "";
  const now = new Date();
  const curIdx = MONTHS.findIndex(m => m.year===now.getFullYear() && m.month===now.getMonth()+1);
  const filled = MONTHS.filter(m => { const v = data[`m${m.id}`]; return v && (v.rc || v.rr); });
  const totalReal = filled.reduce((a,m) => a + (parseFloat(data[`m${m.id}`]?.rr)||0), 0);
  const totalPlan = filled.reduce((a,m) => a + m.totalRev, 0);
  const lastReal = filled.length ? (parseFloat(data[`m${filled[filled.length-1].id}`]?.rc)||0) : 0;
  const lastPlan = filled.length ? filled[filled.length-1].activos : 0;

  return (
    <div style={{ maxWidth:1000, margin:"0 auto" }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:14, flexWrap:"wrap", gap:8 }}>
        <div>
          <div style={{ color:C.textPrimary, fontSize:17, fontWeight:800 }}>📊 TRACKER — PLAN vs. REALIDAD</div>
          <div style={{ color:C.textMuted, fontSize:12 }}>Registra tus números reales. Se guardan automáticamente en el dispositivo.</div>
        </div>
        {saved && <Badge text="✓ Guardado" color={C.green} />}
      </div>

      {filled.length > 0 && <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10, marginBottom:16 }}>
        {[
          { l:"Meses registrados", v:`${filled.length}/22`, c:C.cyan },
          { l:"Clientes reales (último mes)", v:lastReal, c:lastReal>=lastPlan?C.green:C.red, sub:`Plan: ${lastPlan}` },
          { l:"Ingresos reales acumulados", v:fmt(totalReal), c:C.green },
          { l:"vs. Plan acumulado", v:totalPlan>0?((totalReal/totalPlan)*100).toFixed(0)+"%":"—",
            c:totalPlan>0?(totalReal/totalPlan>=1?C.green:totalReal/totalPlan>=.8?C.amber:C.red):C.textMuted,
            sub:fmt(totalPlan)+" planeados" }
        ].map((s,i) => <Card key={i} style={{ textAlign:"center" }}>
          <div style={{ color:s.c, fontSize:20, fontWeight:900 }}>{s.v}</div>
          <div style={{ color:C.textMuted, fontSize:10, marginTop:4 }}>{s.l}</div>
          {s.sub && <div style={{ color:C.textMuted, fontSize:10, marginTop:2 }}>{s.sub}</div>}
        </Card>)}
      </div>}

      <Card style={{ overflowX:"auto" }}>
        <STitle icon="📝" text="REGISTRO MENSUAL — 22 MESES" sub="Columnas cyan = plan · Columnas ✏ = tus números reales" />
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:11 }}>
          <thead><tr style={{ borderBottom:`2px solid ${C.border}` }}>
            <th style={{ color:C.textMuted, padding:"7px 8px", textAlign:"left", fontWeight:600 }}>Mes</th>
            <th style={{ color:C.cyan, padding:"7px 6px", textAlign:"right", fontWeight:600 }}>Plan clientes</th>
            <th style={{ color:C.green, padding:"7px 6px", textAlign:"right", fontWeight:600 }}>✏ Real</th>
            <th style={{ color:C.cyan, padding:"7px 6px", textAlign:"right", fontWeight:600 }}>Plan ingresos</th>
            <th style={{ color:C.green, padding:"7px 6px", textAlign:"right", fontWeight:600 }}>✏ Real $</th>
            <th style={{ color:C.textMuted, padding:"7px 6px", textAlign:"right", fontWeight:600 }}>Δ clientes</th>
            <th style={{ color:C.textMuted, padding:"7px 6px", textAlign:"right", fontWeight:600 }}>Δ ingresos</th>
            <th style={{ color:C.textMuted, padding:"7px 6px", textAlign:"left", fontWeight:600 }}>✏ Notas</th>
          </tr></thead>
          <tbody>
            {MONTHS.map((m, i) => {
              const isCur = i === curIdx;
              const rc = g(m.id,"rc"), rr = g(m.id,"rr"), nota = g(m.id,"nota");
              const dac = rc !== "" ? (parseFloat(rc)||0) - m.activos : null;
              const dar = rr !== "" ? (parseFloat(rr)||0) - m.totalRev : null;
              return <tr key={i} style={{ borderBottom:`1px solid ${C.border}`,
                background:isCur?C.cyan+"0D":i%2===0?C.panel+"66":"transparent" }}>
                <td style={{ padding:"6px 8px", whiteSpace:"nowrap" }}>
                  <span style={{ color:isCur?C.cyan:C.textPrimary, fontWeight:isCur?700:400 }}>
                    {m.label}{isCur?" ← Actual":""}
                  </span>
                </td>
                <td style={{ color:C.textSecondary, padding:"6px 6px", textAlign:"right" }}>{m.activos}</td>
                <td style={{ padding:"6px 6px", textAlign:"right" }}>
                  <input type="number" min="0" max="60" placeholder="—" value={rc}
                    onChange={e => upd(m.id,"rc",e.target.value)}
                    style={{ width:55, background:C.panel, border:`1px solid ${C.green}55`, borderRadius:4,
                      padding:"3px 6px", color:C.textPrimary, fontSize:11, textAlign:"right", outline:"none" }} />
                </td>
                <td style={{ color:C.textSecondary, padding:"6px 6px", textAlign:"right" }}>{fmt(m.totalRev)}</td>
                <td style={{ padding:"6px 6px", textAlign:"right" }}>
                  <input type="number" min="0" placeholder="—" value={rr}
                    onChange={e => upd(m.id,"rr",e.target.value)}
                    style={{ width:85, background:C.panel, border:`1px solid ${C.green}55`, borderRadius:4,
                      padding:"3px 6px", color:C.textPrimary, fontSize:11, textAlign:"right", outline:"none" }} />
                </td>
                <td style={{ padding:"6px 6px", textAlign:"right" }}>
                  {dac !== null && <span style={{ color:dac>=0?C.green:C.red, fontWeight:700 }}>{dac>=0?"+":""}{dac}</span>}
                </td>
                <td style={{ padding:"6px 6px", textAlign:"right" }}>
                  {dar !== null && <span style={{ color:dar>=0?C.green:C.red, fontWeight:700, fontSize:10 }}>
                    {dar>=0?"+":"-"}{fmt(Math.abs(dar))}
                  </span>}
                </td>
                <td style={{ padding:"6px 6px" }}>
                  <input type="text" placeholder="notas..." value={nota}
                    onChange={e => upd(m.id,"nota",e.target.value)}
                    style={{ width:130, background:C.panel, border:`1px solid ${C.border}`, borderRadius:4,
                      padding:"3px 6px", color:C.textSecondary, fontSize:10, outline:"none" }} />
                </td>
              </tr>;
            })}
          </tbody>
        </table>
        <div style={{ color:C.textMuted, fontSize:11, marginTop:10, textAlign:"center" }}>
          Datos guardados automáticamente en este dispositivo · Columnas ✏ son editables
        </div>
      </Card>
    </div>
  );
}

// ── TAB FINANCIERO ────────────────────────────────────────────────────────
function TabFinanciero() {
  const [sc, setSc] = useState("realista");
  const mult = { conservador:.78, realista:1, optimista:1.25 }[sc];
  let cumC = 0, cumR = 0;
  const rows = MONTHS.map(m => {
    const tr = Math.round(m.totalRev*mult);
    const n = tr - m.gastos;
    cumR += tr; cumC += n;
    const ac = sc==="conservador"?Math.max(1,Math.round(m.activos*.82)):sc==="optimista"?Math.min(55,Math.round(m.activos*1.12)):m.activos;
    return { ...m, tr, n, cumR, cumC, ac };
  });
  const fin = rows[rows.length-1];

  return (
    <div style={{ maxWidth:1100, margin:"0 auto" }}>
      <div style={{ display:"flex", gap:10, marginBottom:16, flexWrap:"wrap" }}>
        {["conservador","realista","optimista"].map(s => <button key={s} onClick={() => setSc(s)}
          style={{ padding:"7px 14px", borderRadius:6, border:"none", cursor:"pointer", fontWeight:700, fontSize:12,
            background:sc===s?(s==="conservador"?C.red:s==="optimista"?C.green:C.cyan):C.panel,
            color:sc===s?C.bg:C.textSecondary }}>
          {s.charAt(0).toUpperCase()+s.slice(1)} {s==="conservador"?"(×0.78)":s==="optimista"?"(×1.25)":"(base)"}
        </button>)}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:12, marginBottom:16 }}>
        {[
          { l:"Clientes al 1 may 2028", v:fin.ac, c:C.cyan },
          { l:"MRR final (abr'28)", v:fmt(Math.round(fin.mrr*mult)), c:C.green },
          { l:"Capital total acumulado", v:fmt(fin.cumC), c:C.amber },
          { l:"Facturación total 22 meses", v:fmt(fin.cumR), c:C.purple }
        ].map((s,i) => <Card key={i} style={{ textAlign:"center" }}>
          <div style={{ color:s.c, fontSize:20, fontWeight:900 }}>{s.v}</div>
          <div style={{ color:C.textMuted, fontSize:11, marginTop:4 }}>{s.l}</div>
        </Card>)}
      </div>

      {/* Tabla 22 meses */}
      <Card style={{ overflowX:"auto", marginBottom:16 }}>
        <STitle icon="📊" text="TABLA COMPLETA — 22 MESES (Jul 2026 → Abr 2028)" />
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:10 }}>
          <thead><tr style={{ borderBottom:`2px solid ${C.border}` }}>
            {["#","Mes","F","Nuevos","Perdidos","Activos","Impl","MRR","Total","Gastos","Neto","Acum. Cap"].map(h =>
              <th key={h} style={{ color:C.textMuted, padding:"6px 4px", textAlign:"right", fontWeight:600, whiteSpace:"nowrap" }}>{h}</th>)}
          </tr></thead>
          <tbody>
            {rows.map((r,i) => {
              const hl = r.id===22;
              return <tr key={i} style={{ borderBottom:`1px solid ${C.border}`,
                background:hl?C.green+"11":i%2===0?C.panel+"66":"transparent" }}>
                <td style={{ color:C.textMuted, padding:"5px 4px", textAlign:"right" }}>{r.id}</td>
                <td style={{ color:hl?C.green:C.textPrimary, padding:"5px 4px", fontWeight:hl?800:400, whiteSpace:"nowrap" }}>{r.label}</td>
                <td style={{ textAlign:"center", padding:"5px 4px" }}><Badge text={`F${r.phase}`} color={PHASES[r.phase-1].color} sm /></td>
                <td style={{ color:C.green, padding:"5px 4px", textAlign:"right" }}>+{r.nuevos}</td>
                <td style={{ color:C.red, padding:"5px 4px", textAlign:"right" }}>-{r.perdidos}</td>
                <td style={{ color:C.cyan, padding:"5px 4px", textAlign:"right", fontWeight:700 }}>{r.ac}</td>
                <td style={{ color:C.purple, padding:"5px 4px", textAlign:"right" }}>{r.implRev>0?fmt(Math.round(r.implRev*mult)):"—"}</td>
                <td style={{ color:C.cyan, padding:"5px 4px", textAlign:"right" }}>{fmt(Math.round(r.mrr*mult))}</td>
                <td style={{ color:C.textPrimary, padding:"5px 4px", textAlign:"right", fontWeight:600 }}>{fmt(r.tr)}</td>
                <td style={{ color:C.red, padding:"5px 4px", textAlign:"right" }}>{fmt(r.gastos)}</td>
                <td style={{ color:r.n>=0?C.green:C.red, padding:"5px 4px", textAlign:"right", fontWeight:700 }}>{r.n>=0?fmt(r.n):"-"+fmt(-r.n)}</td>
                <td style={{ color:r.cumC>=0?C.amber:C.red, padding:"5px 4px", textAlign:"right", fontWeight:600 }}>{r.cumC>=0?fmt(r.cumC):"-"+fmt(-r.cumC)}</td>
              </tr>;
            })}
          </tbody>
        </table>
      </Card>

      {/* Precios */}
      <Card>
        <STitle icon="💎" text="ESCALERA DE PRECIOS" />
        <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:10 }}>
          {PRICING.map((p,i) => <div key={i} style={{ padding:12, borderRadius:8, border:`1px solid ${PHASES[i].color}44`, background:PHASES[i].color+"0D" }}>
            <div style={{ color:PHASES[i].color, fontSize:10, fontWeight:700 }}>CLIENTES {p.range}</div>
            <div style={{ display:"flex", gap:12, marginTop:6, marginBottom:6 }}>
              <div><div style={{ color:C.textMuted, fontSize:9 }}>IMPLEMENTACIÓN</div><div style={{ color:C.textPrimary, fontSize:14, fontWeight:800 }}>{p.implLabel||fmt(p.impl)}</div></div>
              <div><div style={{ color:C.textMuted, fontSize:9 }}>MENSUALIDAD</div><div style={{ color:PHASES[i].color, fontSize:14, fontWeight:800 }}>{fmt(p.monthly)}/mo</div></div>
            </div>
            <div style={{ color:C.textMuted, fontSize:10, lineHeight:1.4 }}>{p.reason}</div>
          </div>)}
        </div>
      </Card>
    </div>
  );
}

  );
}

// ── APP ───────────────────────────────────────────────────────────────────
const TABS = [
  { id:"hoy",        icon:"⚡", label:"HOY" },
  { id:"mensual",    icon:"📅", label:"MENSUAL" },
  { id:"tracker",    icon:"📊", label:"TRACKER" },
  { id:"fases",      icon:"🚀", label:"FASES" },
  { id:"financiero", icon:"💰", label:"FINANCIERO" },
  { id:"riesgos",    icon:"⚠️", label:"RIESGOS" },
  { id:"sistemas",   icon:"⚙️", label:"SISTEMAS" }
];

function App() {
  const [tab, setTab] = useState("hoy");
  const [selM, setSelM] = useState(() => {
    const now = new Date();
    const i = MONTHS.findIndex(m => m.year===now.getFullYear() && m.month===now.getMonth()+1);
    return i >= 0 ? i : 0;
  });

  return (
    <div style={{ background:C.bg, minHeight:"100vh" }}>
      <div style={{ background:C.panel, borderBottom:`1px solid ${C.border}`, padding:"0 14px", position:"sticky", top:0, zIndex:100 }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between" }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, padding:"10px 0" }}>
            <div style={{ width:28, height:28, borderRadius:6, background:`linear-gradient(135deg,${C.cyan},${C.purple})`,
              display:"flex", alignItems:"center", justifyContent:"center", fontWeight:900, fontSize:14, color:C.bg }}>N</div>
            <div>
              <div style={{ color:C.textPrimary, fontWeight:800, fontSize:13 }}>NEGOFLOW</div>
              <div style={{ color:C.textMuted, fontSize:8, letterSpacing:1.5 }}>PLAN MAESTRO · JUL 2026 → MAY 2028 · 22 MESES</div>
            </div>
          </div>
          <div style={{ display:"flex", gap:1, flexWrap:"wrap" }}>
            {TABS.map(t => <button key={t.id} onClick={() => setTab(t.id)}
              style={{ padding:"8px 8px", borderRadius:4, border:"none", cursor:"pointer", fontSize:10, fontWeight:700,
                background:tab===t.id?C.cyan+"22":"transparent", color:tab===t.id?C.cyan:C.textSecondary,
                borderBottom:tab===t.id?`2px solid ${C.cyan}`:"2px solid transparent" }}>
              {t.icon} {t.label}
            </button>)}
          </div>
        </div>
      </div>

      <div style={{ padding:"16px 14px", maxWidth:1100, margin:"0 auto" }}>
        {tab==="hoy"        && <TabHoy />}
        {tab==="mensual"    && <TabMensual sel={selM} setSel={setSelM} />}
        {tab==="tracker"    && <TabTracker />}
        {tab==="fases"      && <TabFases />}
        {tab==="financiero" && <TabFinanciero />}
        {tab==="riesgos"    && <TabRiesgos />}
        {tab==="sistemas"   && <TabSistemas />}
      </div>

      <div style={{ borderTop:`1px solid ${C.border}`, padding:"8px 14px", textAlign:"center" }}>
        <div style={{ color:C.textMuted, fontSize:10 }}>
          NegoFlow Plan Maestro · 22 meses · Jul 2026 → Abr 2028 · 50 clientes · MRR $285k
          <span style={{ color:C.cyan }}> · ✈ Europa Jun–Ago 2028</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
